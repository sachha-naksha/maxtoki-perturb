# NR4A3 overexpress; context = 3 evenly-spaced cells along the 34 y/o (YM2)
# trajectory. Query = each 80 y/o cell (OM6 + OM9). 8k context length, paired
# with nr4a3_inhibit_evenly_seq8k to read out signed direction of the NR4A3
# nuclear-receptor / exercise-response perturbation in pseudotime.
data:
  h5ad: ./data/zero_shot/rna_zero_shot.preprocessed.h5ad
  pseudotime_col: Pseudotime
  group_col: sample
  cell_id_col: null
  count_col: nCount_RNA

context:
  strategy: pool
  max_cells: 3
  ordering: pseudotime
  pool_filter:
    age: [34]
  pool_select:
    n: 3
    pick: evenly_spaced
    sort_by: pseudotime
    seed: 0

query:
  strategy: each_cell
  filter_obs:
    age: [80]

perturbation:
  gene_symbol: NR4A3
  gene: null
  direction: overexpress
  apply_to: query

seq_length: 8192
